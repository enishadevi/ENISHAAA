name: Production Deployment

on:
  push:
    branches: [ main ]  # Only runs when code is pushed to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Use the new secret
        env:
          # Update the name here if you changed it in GitHub Settings
          MY_APP_TOKEN: ${{ secrets.YOUR_NEW_SECRET_NAME }}
        run: ./deploy.sh
        env:
          # Mapping them to local env variables for scripts to use
          API_URL: ${{ vars.API_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
